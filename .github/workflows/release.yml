name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Rust 안정 버전 설치
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust 빌드 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: npm 의존성 설치
        run: npm ci

      - name: Windows 코드 서명 인증서 설정
        if: ${{ secrets.WINDOWS_CERTIFICATE != '' }}
        shell: pwsh
        run: |
          $certBytes = [System.Convert]::FromBase64String("${{ secrets.WINDOWS_CERTIFICATE }}")
          $certPath = "$env:RUNNER_TEMP\certificate.pfx"
          [System.IO.File]::WriteAllBytes($certPath, $certBytes)
          echo "WINDOWS_CERT_PATH=$certPath" >> $env:GITHUB_ENV

      - name: Tauri 앱 빌드 (Windows)
        env:
          TAURI_ENV_TARGET_TRIPLE: x86_64-pc-windows-msvc
          # Tauri 업데이터 서명 키 (GitHub Secrets 등록 필요)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Windows Authenticode 서명 (PFX 인증서 - GitHub Secrets: WINDOWS_CERTIFICATE, WINDOWS_CERTIFICATE_PASSWORD)
          WINDOWS_CERTIFICATE_PATH: ${{ env.WINDOWS_CERT_PATH }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: npm run tauri build -- --target x86_64-pc-windows-msvc

      - name: GitHub Releases 파일 업로드
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
