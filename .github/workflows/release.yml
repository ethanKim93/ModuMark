name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '릴리즈 태그 (예: v0.2.2)'
        required: true
        default: 'v0.2.2'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Rust 안정 버전 설치
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust 빌드 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: npm 최신 버전 설치
        run: npm install -g npm@latest

      - name: npm 의존성 설치
        run: npm ci

      # tauri-action이 빌드 + 릴리즈 + latest.json 업로드를 모두 처리
      - name: Tauri 앱 빌드 및 릴리즈
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: 'ModuMark ${{ github.event_name == ''workflow_dispatch'' && inputs.tag || github.ref_name }}'
          releaseBody: '이 버전의 설치 파일은 아래 Assets에서 다운로드하세요.'
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: --target x86_64-pc-windows-msvc
